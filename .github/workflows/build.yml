name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        run: pyinstaller --onefile --name 演示小软件 --console "演示用小软件.py"
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 演示小软件-exe
          path: dist/演示小软件.exe
